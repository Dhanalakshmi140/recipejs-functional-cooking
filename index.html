<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeJS - Your Functional Cooking Companion</title>
    <link rel="stylesheet" href="style.css">




    <!-- Search -->
    <div class="search-container">
        <input 
            type="text" 
            id="search-input" 
            placeholder="Search recipes or ingredients..."
            autocomplete="off"
        >
        <button id="clear-search" class="clear-btn">✕</button>
    </div>
</header>

<main>

    <!-- Filters -->
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="veg">Vegetarian</button>
        <button class="filter-btn" data-filter="nonveg">Non-Vegetarian</button>
        <button class="filter-btn" data-filter="favorites">❤️ Favorites</button>
    </div>

    <!-- Sort -->
    <div class="sort-container">
        <select id="sort-select">
            <option value="default">Sort By</option>
            <option value="time">Cooking Time</option>
            <option value="difficulty">Difficulty</option>
        </select>
    </div>

    <!-- Counter -->
    <div class="recipe-info">
        <p id="recipe-count"></p>
    </div>

    <!-- Recipes -->
    <div id="recipe-container" class="recipe-container"></div>

</main>


<body>

    <header>
        <h1>🍳 RecipeJS</h1>
        <p>Your Functional Cooking Companion</p>
    </header>

    <main>
        <div id="recipe-container">
            <!-- Recipe cards will be rendered here by JavaScript -->
        </div>
    </main>

    <!-- 🔽 Part 2 Controls Section -->
<section class="controls">

  <div class="filter-buttons">
    <button data-filter="all" class="active">Show All</button>
    <button data-filter="easy">Easy</button>
    <button data-filter="medium">Medium</button>
    <button data-filter="hard">Hard</button>
    <button data-filter="quick">Quick (&lt; 30 mins)</button>
  </div>

  <div class="sort-buttons">
    <button data-sort="none" class="active">Default</button>
    <button data-sort="name">Name (A-Z)</button>
    <button data-sort="time">Time (Fastest)</button>
  </div>

</section>


    

    <!-- Recipe Cards Will Render Here -->
    <div id="recipe-container"></div>

    <script src="app.js"></script>


    <script src="app.js"></script>
</body>
</html>
